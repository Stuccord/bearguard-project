  <body>
    <div id="root"></div>
    <!-- Restore deep-link URL saved by public/404.html (GitHub Pages SPA fix) -->
    <script>
      (function () {
        var redirect = sessionStorage.getItem('spa_redirect');
        if (redirect) {
          sessionStorage.removeItem('spa_redirect');
          if (redirect !== location.href && redirect !== location.pathname) {
            // Restore the original path/hash without a page reload
            history.replaceState(null, '', redirect);
          }
        }
      })();
    </script>
  </body>
